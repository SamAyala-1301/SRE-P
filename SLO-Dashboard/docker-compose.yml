version: "3.8"

networks:
  sre-net:
    driver: bridge

services:

  exporter:
    build:
      context: ./exporter
      dockerfile: Dockerfile
    container_name: insurance-metrics-exporter
    ports:
      - "8000:8000"
    networks:
      - sre-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: insurance-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    networks:
      - sre-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: insurance-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=sre123
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/slo_dashboard.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - sre-net
    depends_on:
      - prometheus
    restart: unless-stopped